<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>eyebrain</title>
<style>
  :root{ --bg:#0b0f14; --txt:#e6edf3; --muted:#8b98a5; --accent:#3fd0c9; --accent2:#5b9dff; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--txt);
       font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       display:flex;align-items:center;justify-content:center}
  .slide{position:relative;width:1280px;height:720px;overflow:hidden;
         display:flex;flex-direction:column;align-items:center;justify-content:center;
         background:
           radial-gradient(900px 480px at 50% 8%,rgba(63,208,201,.16),transparent 70%),
           radial-gradient(700px 420px at 78% 96%,rgba(91,157,255,.12),transparent 70%),
           var(--bg)}
  /* faint scanning grid for a 'camera' feel */
  .slide::before{content:"";position:absolute;inset:0;opacity:.06;
    background-image:linear-gradient(var(--accent) 1px,transparent 1px),
                     linear-gradient(90deg,var(--accent) 1px,transparent 1px);
    background-size:46px 46px;mask:radial-gradient(circle at 50% 45%,#000,transparent 78%)}
  .brand{display:flex;align-items:center;gap:18px;z-index:1;margin-bottom:30px}
  .logo{width:64px;height:64px;border-radius:16px;
        background:radial-gradient(circle at 30% 30%,var(--accent),var(--accent2));
        box-shadow:0 0 46px rgba(63,208,201,.55)}
  .name{font-size:46px;font-weight:700;letter-spacing:.5px}
  h1{z-index:1;font-size:78px;line-height:1.04;font-weight:750;letter-spacing:-1px;text-align:center}
  h1 .dot{color:var(--accent)}
  .sub{z-index:1;margin-top:22px;font-size:21px;color:var(--muted);text-align:center}
  .sub b{color:var(--txt);font-weight:600}
  .foot{position:absolute;bottom:34px;z-index:1;color:var(--muted);font-size:13px;
        letter-spacing:.6px;display:flex;gap:14px;align-items:center}
  .foot .pill{border:1px solid #243041;border-radius:20px;padding:5px 12px}
  .foot .pill b{color:var(--accent)}
</style>
</head>
<body>
  <div class="slide">
    <div class="brand">
      <div class="logo"></div>
      <div class="name">eyebrain</div>
    </div>
    <h1>Talk to your cameras<span class="dot">.</span></h1>
    <div class="sub">On-device AI that finds the moment &mdash; <b>just ask</b>.</div>
    <div class="foot">
      <span class="pill"><b>On-device</b> · raw video never leaves the node</span>
      <span class="pill"><b>Moss</b>-powered search</span>
      <span class="pill"><b>Voice</b>-native</span>
    </div>
  </div>
</body>
</html>
